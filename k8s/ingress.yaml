apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: price-insight
  namespace: price-insight
spec:
  ingressClassName: nginx
  rules:
    - host: www.pricewatch.example.dev
      http:
        paths:
          - path: /api/_nuxt_icon
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
          - path: /api/_nuxt
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 4000
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
---
# Permanent redirect: pricewatch.example.dev → www.pricewatch.example.dev
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: price-insight-www-redirect
  namespace: price-insight
  annotations:
    nginx.ingress.kubernetes.io/permanent-redirect: "https://www.pricewatch.example.dev/"
spec:
  ingressClassName: nginx
  rules:
    - host: pricewatch.example.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
